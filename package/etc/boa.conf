# Boa Configuration for LubanCat RK3566
# See: http://www.boa.org/

Port 80
User root
Group root
ServerName LubanCat

# Error logs
ErrorLog /var/log/boa/error_log
AccessLog /var/log/boa/access_log

# Document root
DocumentRoot /home/www

# Directory listings
DirectoryIndex index.html

# KeepAlive
KeepAliveMax 100
KeepAliveTimeout 10

# MIME types file
MimeTypes /etc/mime.types
DefaultType text/plain

# CGI configuration
ScriptAlias /cgi-bin/ /home/www/cgi-bin/
CGIPath /bin:/sbin:/usr/bin:/usr/sbin

# No virtual hosting
SinglePostLimit 10485760
