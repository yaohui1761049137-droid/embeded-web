# /etc/lighttpd/conf-available/10-cgi.conf — CGI support
# Maps /cgi-bin/ URL path to /home/www/cgi-bin/ directory

server.modules += ( "mod_cgi" )

# CGI handler: .cgi files executed directly (C/C++ compiled CGI)
cgi.assign = (
    ".cgi" => ""
)

# URL alias: /cgi-bin/xxx → /home/www/cgi-bin/xxx
alias.url = (
    "/cgi-bin/" => "/home/www/cgi-bin/"
)

# Ensure CGI files in cgi-bin are executed
$HTTP["url"] =~ "^/cgi-bin/" {
    cgi.assign = (".cgi" => "")
}
