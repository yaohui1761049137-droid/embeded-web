# /etc/lighttpd/lighttpd.conf — LubanCat embedded web server
# Replaces Boa with Lighttpd + CGI + HTTPS

#─────────────────────────────────────
# Modules
#─────────────────────────────────────
server.modules = (
    "mod_access",
    "mod_accesslog",
    "mod_alias",
    "mod_cgi",
    "mod_openssl",
    "mod_redirect",
    "mod_setenv",
    "mod_indexfile",
    "mod_staticfile"
)

#─────────────────────────────────────
# Basic Settings
#─────────────────────────────────────
server.document-root       = "/home/www"
server.upload-dirs         = ( "/var/cache/lighttpd/uploads" )
server.errorlog            = "/var/log/lighttpd/error.log"
server.pid-file            = "/run/lighttpd.pid"
server.username            = "www-data"
server.groupname           = "www-data"
server.port                = 80
server.bind                = "0.0.0.0"

# Directory index
index-file.names           = ( "index.html" )

#─────────────────────────────────────
# MIME Types
#─────────────────────────────────────
mimetype.assign = (
    ".html" => "text/html; charset=utf-8",
    ".htm"  => "text/html; charset=utf-8",
    ".css"  => "text/css; charset=utf-8",
    ".js"   => "text/javascript; charset=utf-8",
    ".json" => "application/json; charset=utf-8",
    ".png"  => "image/png",
    ".jpg"  => "image/jpeg",
    ".jpeg" => "image/jpeg",
    ".gif"  => "image/gif",
    ".ico"  => "image/x-icon",
    ".svg"  => "image/svg+xml",
    ".txt"  => "text/plain; charset=utf-8",
    ".xml"  => "application/xml"
)

#─────────────────────────────────────
# Access Log
#─────────────────────────────────────
accesslog.filename = "/var/log/lighttpd/access.log"

#─────────────────────────────────────
# Include modular configs
#─────────────────────────────────────
include "conf-enabled/*.conf"
